name: Release Latest
on: [workflow_dispatch]

permissions:
  contents: read

jobs:
  release:
    runs-on: macos-latest
    environment: release
    permissions:
      contents: write # create/replace the rolling "latest" Release
      id-token: write # OIDC token for build-provenance attestation
      attestations: write # write the attestation to the attestations store
    steps:
    - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        persist-credentials: false
    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: '22.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Package
      run: npm run package

    - name: Attest build provenance
      uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
      with:
        subject-path: |
          release/build/*.dmg
          release/build/*.zip

    # Replaces marvinpinto/action-automatic-releases. The "latest" release and
    # its tag are deleted then recreated so the rolling release is refreshed
    # idempotently (|| true keeps the very first run from failing).
    - name: Publish "latest" Release on GitHub
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release delete latest --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes || true
        gh release create latest \
          --repo "$GITHUB_REPOSITORY" \
          --title "Latest" \
          --notes "Rolling latest build from ${{ github.sha }}." \
          --latest \
          release/build/*.dmg \
          release/build/*.zip
