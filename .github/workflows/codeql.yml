name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly — Mondays 07:00 UTC
    - cron: '0 7 * * 1'

# Least privilege: CodeQL needs to upload results; everything else read-only.
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      security-events: write # upload CodeQL results to the Security tab
      contents: read # checkout the repo
      actions: read # read workflow run metadata

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:javascript-typescript'
