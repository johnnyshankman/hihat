# Dependabot configuration for hihat
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2

updates:
  # ---------------------------------------------------------------
  # Root npm manifest (the app + all build/test tooling)
  # ---------------------------------------------------------------
  - package-ecosystem: 'npm'
    directory: '/'
    target-branch: 'main'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'America/New_York'
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'fix(deps)'
      prefix-development: 'chore(deps-dev)'
      include: 'scope'
    # Electron, React, and Webpack majors are load-bearing for a working
    # desktop build. Patch/minor are auto-handled; majors land as
    # deliberate, tested PRs rather than noisy auto-updates.
    ignore:
      - dependency-name: 'electron'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']
      - dependency-name: 'webpack'
        update-types: ['version-update:semver-major']
      - dependency-name: 'electron-builder'
        update-types: ['version-update:semver-major']
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
    groups:
      production-minor-patch:
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'
      dev-minor-patch:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'

  # ---------------------------------------------------------------
  # release/app npm manifest (electron-builder reads this pair)
  # ---------------------------------------------------------------
  - package-ecosystem: 'npm'
    directory: '/release/app'
    target-branch: 'main'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'America/New_York'
    open-pull-requests-limit: 5
    versioning-strategy: increase
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'fix(deps)'
      prefix-development: 'chore(deps-dev)'
      include: 'scope'
    groups:
      release-app-all:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'

  # ---------------------------------------------------------------
  # GitHub Actions used in .github/workflows/*
  # ---------------------------------------------------------------
  - package-ecosystem: 'github-actions'
    directory: '/'
    target-branch: 'main'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'America/New_York'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'ci'
      include: 'scope'
    groups:
      actions-all:
        patterns:
          - '*'
